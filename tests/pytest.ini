[pytest]
# Pytest configuration for SQL agent tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests with mocked dependencies (fast, no external calls)
    integration: Integration tests requiring database connection (slower)
    slow: Tests that take longer to execute

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.12
