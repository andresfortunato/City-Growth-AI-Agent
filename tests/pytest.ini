[pytest]
# Pytest configuration for City Growth AI Agent tests

# Add src/ to Python path so tests can import agent modules
pythonpath = src

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests with mocked dependencies (fast, no external calls)
    integration: Integration tests requiring database connection (slower)
    slow: Tests that take longer to execute
    legacy: Tests for deprecated sql_agent module (skip in CI)

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --ignore=tests/test_agent.py
    --ignore=tests/test_nodes.py
    --ignore=tests/test_tools.py

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.12
